name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start AFFiNE stack
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for AFFiNE and create test user
        run: npm run test:e2e:setup
        env:
          AFFINE_BASE_URL: http://localhost:3010
          AFFINE_EMAIL: ${{ vars.TEST_AFFINE_EMAIL || 'test@affine-mcp.local' }}
          AFFINE_PASSWORD: ${{ secrets.TEST_AFFINE_PASSWORD || 'test-password-for-ci' }}

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          AFFINE_BASE_URL: http://localhost:3010
          AFFINE_EMAIL: ${{ vars.TEST_AFFINE_EMAIL || 'test@affine-mcp.local' }}
          AFFINE_PASSWORD: ${{ secrets.TEST_AFFINE_PASSWORD || 'test-password-for-ci' }}

      - name: Dump AFFiNE logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs affine

      - name: Tear down AFFiNE stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t affine-mcp-test .

      - name: Verify Docker image starts
        run: |
          timeout 10 docker run --rm affine-mcp-test 2>&1 || true
