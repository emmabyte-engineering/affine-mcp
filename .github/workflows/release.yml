name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Set version from tag
        run: npm version "${{ github.event.release.tag_name }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --provenance --access public

  publish-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            emmabyteeng/affine-mcp:latest
            emmabyteeng/affine-mcp:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=AFFiNE MCP Server
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/emmabyte-engineering/affine-mcp
            org.opencontainers.image.revision=${{ github.sha }}

  publish-standalone:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Install esbuild
        run: npm install --no-save esbuild

      - name: Bundle into single file
        run: |
          npx esbuild dist/index.js --bundle --platform=node --format=esm \
            --outfile=affine-mcp.mjs --external:bufferutil --external:utf-8-validate \
            --banner:js="#!/usr/bin/env node"

      - name: Upload standalone bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" affine-mcp.mjs
